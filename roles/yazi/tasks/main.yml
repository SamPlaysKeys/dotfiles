---
- name: Clone Yazi repository
  git:
    repo: https://github.com/sxyazi/yazi.git
    dest: /tmp/yazi
    depth: 1
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Build Yazi
  shell: cargo build --release --locked
  args:
    chdir: /tmp/yazi
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:/opt/homebrew/bin:{{ ansible_env.PATH }}"
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Install Yazi
  copy:
    src: "/tmp/yazi/target/release/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  become: yes
  with_items:
    - yazi
    - ya
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Install Yazi and dependencies (macOS)
  shell: brew install yazi ffmpeg-full sevenzip jq poppler fd ripgrep fzf zoxide resvg imagemagick-full font-symbols-only-nerd-font
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  when: ansible_os_family == 'Darwin'
  tags: [yazi, install]

- name: Link Yazi dependencies (macOS)
  shell: brew link ffmpeg-full imagemagick-full -f --overwrite
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  when: ansible_os_family == 'Darwin'
  tags: [yazi, install]