- name: Ensure Yazi extraction directory is removed for a fresh start
  file:
    path: "/tmp/yazi-{{ ansible_architecture }}-unknown-linux-gnu"
    state: absent
  become: yes
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Get Yazi latest release version
  uri:
    url: https://api.github.com/repos/sxyazi/yazi/releases/latest
    return_content: yes
  register: yazi_latest_release
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Download and extract Yazi release
  unarchive:
    src: "https://github.com/sxyazi/yazi/releases/download/{{ yazi_latest_release.json.tag_name }}/yazi-{{ ansible_architecture }}-unknown-linux-gnu.zip"
    dest: /tmp/
    remote_src: yes
  become: yes
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Install Yazi
  copy:
    src: "/tmp/yazi-{{ ansible_architecture }}-unknown-linux-gnu/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  become: yes
  with_items:
    - yazi
    - ya
  when: ansible_os_family != 'Darwin'
  tags: [yazi, install]

- name: Install Yazi and dependencies (macOS)
  shell: brew install yazi ffmpeg-full sevenzip jq poppler fd ripgrep fzf zoxide resvg imagemagick-full font-symbols-only-nerd-font
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  when: ansible_os_family == 'Darwin'
  tags: [yazi, install]

- name: Link Yazi dependencies (macOS)
  shell: brew link ffmpeg-full imagemagick-full -f --overwrite
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  when: ansible_os_family == 'Darwin'
  tags: [yazi, install]